readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "torch>=2.12.0",
]

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "triton>=3.7.0",
    "nvidia-cutlass-dsl>=4.5.0",
    "pytest>=9.0.3",
    "pyperf>=2.10.0",
]
